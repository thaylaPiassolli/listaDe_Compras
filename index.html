<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lista de Compras</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">

    <h1>Lista de Compras!</h1>
    <p class="subtitulo">
      Organize suas compras de forma divertida
    </p>

    <div class="input-area">
      <input 
        type="text" 
        id="inputFruta" 
        placeholder="Digite uma fruta..."
      >

      <button id="btnAdicionar">
        Adicionar
      </button>
    </div>

    <ul id="listaCompras"></ul>

  </div>

  <script src="script.js"></script>
</body>
</html>
